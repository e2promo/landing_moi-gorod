<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | МОЙ ГОРОД</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Login disabled -->
    <div id="login-screen" class="login-container" style="display: none;"></div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="dashboard-container" style="display: none;">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <h1>📊 Панель управления заявками</h1>
                <div class="header-actions">
                    <span class="user-info">Администратор</span>
                    <button type="button" id="logout-btn" class="btn-secondary">Выйти</button>
                </div>
            </div>
        </header>

        <!-- Tab Navigation -->
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="leads">📋 Заявки</button>
            <button class="tab-btn" data-tab="content">✏️ Редактор контента</button>
        </div>

        <!-- Leads Tab -->
        <div id="leads-tab" class="tab-content active">
            <!-- Statistics Cards -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📋</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-total">0</div>
                            <div class="stat-label">Всего заявок</div>
                        </div>
                    </div>
                    <div class="stat-card new">
                        <div class="stat-icon">🆕</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-new">0</div>
                            <div class="stat-label">Новые</div>
                        </div>
                    </div>
                    <div class="stat-card contacted">
                        <div class="stat-icon">📞</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-contacted">0</div>
                            <div class="stat-label">Обработаны</div>
                        </div>
                    </div>
                    <div class="stat-card closed">
                        <div class="stat-icon">✅</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-closed">0</div>
                            <div class="stat-label">Закрыты</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Filters and Actions -->
            <section class="controls-section">
                <div class="controls-grid">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="🔍 Поиск по имени или телефону...">
                    </div>
                    <div class="filter-group">
                        <select id="filter-status" class="filter-select">
                            <option value="">Все статусы</option>
                            <option value="new">Новые</option>
                            <option value="contacted">Обработаны</option>
                            <option value="closed">Закрыты</option>
                        </select>
                        <select id="filter-city" class="filter-select">
                            <option value="">Все города</option>
                            <option value="donetsk">Донецк</option>
                            <option value="makeevka">Макеевка</option>
                            <option value="both">Оба города</option>
                        </select>
                        <button id="export-csv-btn" class="btn-export">📥 Экспорт в CSV</button>
                    </div>
                </div>
            </section>

            <!-- Leads Table -->
            <section class="table-section">
                <div class="table-container">
                    <table class="leads-table">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Имя</th>
                                <th>Телефон</th>
                                <th>Город</th>
                                <th>Адресн. пр.</th>
                                <th>Формат</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="leads-table-body">
                            <tr class="no-data">
                                <td colspan="8">Заявок пока нет</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
        <!-- End Leads Tab -->

        <!-- Content Editor Tab -->
        <div id="content-tab" class="tab-content" style="display: none;">
            <div id="content-editor-container">
                <!-- Content editor will be rendered here by JavaScript -->
            </div>
        </div>
        <!-- End Content Editor Tab -->
    </div>

    <!-- Lead Detail Modal -->
    <div id="lead-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Детали заявки</h2>
                <button type="button" class="modal-close" id="modal-close-btn" onclick="hideLeadModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Lead details will be inserted here -->
            </div>
        </div>
    </div>

    <script src="leads-storage.js"></script>
    <script src="content-editor-simple.js"></script>
    <script src="admin.js"></script>
</body>

</html>
